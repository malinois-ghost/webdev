<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Development Home</title>
    <link href="home_page_styles/index.css" rel="stylesheet">
</head>
<body>

<!-- Fullscreen canvas for all sky effects: stars, sun, moon, clouds, rain, god rays, birds -->
<canvas id="sky-canvas"></canvas>

<!-- Horizon gradient overlay -->
<div id="horizon"></div>

<h1 id="page-title">Web Development</h1>

<div class="clock-container" id="clock-container">
    <span id="digital-clock"></span>
    <span class="clock-divider">·</span>
    <span id="solar-clock" title="True solar time"></span>
    <span class="clock-divider">·</span>
    <span id="weather-icon" title=""></span>
</div>

<div class="search-container">
    <div class="filter-group">
        <label for="course-filter"></label>
        <input type="text" id="course-filter" placeholder="Vak (bijv. ...) of naam...">

        <label for="lab-filter"></label>
        <input type="text" id="lab-filter" placeholder="Labo (bijv. ...) of naam...">

        <label for="project-filter"></label>
        <input type="text" id="project-filter" placeholder="..." style="display: none;">

        <button id="clear-search-btn">Wis filters</button>
    </div>
</div>

<div id="labo-container" class="labo-grid"></div>

<button id="close-all-btn" title="Sluit alle labo's">✕ Sluit Alles</button>

<div class="cursor-orb"></div>

<script src="home_page_scripts/canvas.js"></script>
<script src="home_page_scripts/sky.js"></script>
<script src="home_page_scripts/celestial.js"></script>
<script src="home_page_scripts/atmosphere.js"></script>
<script src="home_page_scripts/weather.js"></script>
<script src="home_page_scripts/orb.js"></script>
<script src="home_page_scripts/clock.js"></script>
<script src="home_page_scripts/stats.js"></script>
<script src="home_page_scripts/index.js"></script>

</body>
</html>
