<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matching Game</title>
    <link rel="stylesheet" href="style/matching_game.css">
</head>
<body>
<div id="header">
    <h1>⚡ Apex Memory</h1>

    <div id="controls">
        <div id="modeSwitch">
            <span class="mode-label">🖼️</span>
            <label class="switch">
                <input type="checkbox" id="audioModeToggle">
                <span class="slider"></span>
            </label>
            <span class="mode-label">🔊</span>
        </div>

        <div id="matchCountControl">
            <label for="matchCountSlider">
                Cards per match: <span id="sliderValueDisplay">2</span>
            </label>
            <input type="range" id="matchCountSlider" min="2" max="4" value="2" step="1">
        </div>

        <span id="attemptsDisplay">Attempts: 0</span>
    </div>

    <button id="startBtn">Start Game</button>
</div>

<div id="playField"></div>

<footer>
    <a href="../../index.html">Home Page</a>
    <div id="credit">
        <p>Images and sounds are property of</p>
        <a href="https://www.ea.com/games/apex-legends" target="_blank" rel="noopener">
            Apex Legends © Respawn Entertainment / Electronic Arts
        </a>.
        <p>This project is for educational purposes only.</p>
    </div>
</footer>

<script src="script/matching_game.js"></script>
</body>
</html>
