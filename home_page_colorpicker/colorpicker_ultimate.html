<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorpicker Ultimate</title>
    <link rel="stylesheet" href="../home_page_styles/colorpicker_ultimate.css">
</head>
<body>

<div id="app">

    <!-- Wheel + Values side-by-side, move together as one unit -->
    <div id="wheel-values-group">

        <div class="panel" id="wheel-panel">
            <div class="panel-title">Color wheel</div>
            <div id="wheel-wrap">
                <canvas id="wheelCanvas" width="200" height="200"></canvas>
                <div id="wheelCursor"></div>
            </div>
            <div id="alpha-row">
                <label>A</label>
                <label for="alphaSlider"></label><input type="range" id="alphaSlider" min="0" max="100" value="100" step="1">
                <span id="alpha-val">100%</span>
            </div>
            <div id="preview-strip"></div>
            <div id="btn-row">
                <button id="btnInvert">Invert</button>
                <button id="btnSave">Save swatch</button>
                <button id="btnAddMix">Add to mixer</button>
            </div>
            <div id="saved-swatches"></div>
        </div>

        <div class="panel" id="values-panel">
            <div class="panel-title">Color values</div>
            <label for="nlInput"></label><input id="nlInput" placeholder="Type: 'light blue', '#ff6600', 'hsl(200,80%,50%)'..." autocomplete="off">
            <div id="nl-status"></div>
            <div id="format-tabs">
                <button class="ftab active" data-fmt="hex">HEX</button>
                <button class="ftab" data-fmt="rgb">RGB</button>
                <button class="ftab" data-fmt="hsl">HSL</button>
                <button class="ftab" data-fmt="hsv">HSV</button>
                <button class="ftab" data-fmt="cmyk">CMYK</button>
                <button class="ftab" data-fmt="lab">CIE Lab</button>
                <button class="ftab" data-fmt="munsell">Munsell</button>
                <button class="ftab" data-fmt="ncs">NCS</button>
            </div>
            <div id="formatted-output" title="Click to copy"></div>
            <div id="copy-flash"></div>
            <div class="inputs-grid" id="inputs-grid"></div>
        </div>

    </div>

    <div class="panel" id="mixer-panel">
        <div id="mixer-title-row">
            <div class="panel-title" style="margin:0">Paint mixer</div>
            <div class="mixer-hint">Click a slot to activate, then "Add to mixer"</div>
        </div>
        <div id="mixer-colors">
            <div class="mix-slot">
                <div class="mix-swatch active-mix" id="mixA" style="background:#e74c3c"></div>
                <div class="mix-label">Color A</div>
            </div>
            <div class="mix-center">
                <div class="mix-plus">+</div>
                <div id="mix-ratio-row">
                    <span class="mix-ratio-label" id="ratioLabelA">50%</span>
                    <label for="mixRatio"></label><input type="range" id="mixRatio" min="0" max="100" value="50" step="1">
                    <span class="mix-ratio-label" id="ratioLabelB">50%</span>
                </div>
            </div>
            <div class="mix-slot">
                <div class="mix-swatch" id="mixB" style="background:#3498db"></div>
                <div class="mix-label">Color B</div>
            </div>
            <div class="mix-equals">=</div>
            <div class="mix-slot">
                <div id="mix-result" class="checkerboard"></div>
                <div class="mix-label">Result</div>
            </div>
            <div class="mix-actions">
                <button id="use-mix-btn">Use result</button>
                <button id="add-mix-btn">Save result</button>
            </div>
        </div>
    </div>

</div>

<footer>
    <a href="../index.html">Home page</a>
</footer>

<script src="../home_page_scripts/colorpicker_ultimate.js"></script>
</body>
</html>
