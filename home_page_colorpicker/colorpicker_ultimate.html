<!DOCTYPE html>
<html lang="nl">
<head>
    <title>Colorpicker Ultimate</title>
    <link rel="stylesheet" href="../home_page_colorpicker/colorpicker_ultimate.html">
</head>
<body>

<div id="picker">
    <div id="previewArea">
        <p>Een gekleurd blokje:</p>
        <div class="colorCube"></div>
    </div>

    <div id="controls">

        <div class="controlRow">
            <label>R</label>
            <label>
                <input type="range" class="sliderRed" min="0" max="255">
            </label>
            <label>
                <input type="number" class="valRed" min="0" max="255">
            </label>
        </div>

        <div class="controlRow">
            <label>G</label>
            <label>
                <input type="range" class="sliderGreen" min="0" max="255">
            </label>
            <label>
                <input type="number" class="valGreen" min="0" max="255">
            </label>
        </div>

        <div class="controlRow">
            <label>B</label>
            <label>
                <input type="range" class="sliderBlue" min="0" max="255">
            </label>
            <label>
                <input type="number" class="valBlue" min="0" max="255">
            </label>
        </div>

        <div class="controlRow">
            <label>A</label>
            <label>
                <input type="range" class="sliderAlpha" min="0" max="100">
            </label>
            <label>
                <input type="number" class="valAlpha" min="0" max="100">
            </label>
        </div>

        <div id="buttonRow">
            <button id="btnInvert">Invert</button>
            <button id="btnSave">Save</button>
        </div>

    </div>
</div>

<div id="savedColors"></div>

<footer>
    <a href="../index.html">Home page</a>
</footer>

<script src="../home_page_scripts/colorpicker_ultimate.js"></script>
</body>
</html>
